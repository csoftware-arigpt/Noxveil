version: '3.8'

services:
  noxveil:
    image: noxveil:latest
    container_name: noxveil
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "1324:1324"
    volumes:
      - ./data:/app/data
      - ./web-ui:/app/web-ui
      - ./agent:/app/agent
    environment:
      - C2_PORT=1324
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-changemeplease}
      - ENABLE_TUNNEL=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env or environment}
      - AGENT_AUTH_TOKEN=${AGENT_AUTH_TOKEN:?AGENT_AUTH_TOKEN must be set in .env or environment}
    restart: unless-stopped
    networks:
      - noxveil-network
networks:
  noxveil-network:
    driver: bridge
