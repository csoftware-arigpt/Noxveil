<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxveil // server shell</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--ink-0);
            color: var(--text-light);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--ink-1);
            border-bottom: 1px solid var(--line);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: -1px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--signal-edge) 30%, var(--signal-edge) 70%, transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-family: var(--font-mono);
            font-size: 0.94rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-light);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        .header h1::before {
            content: "▍";
            color: var(--signal);
            font-size: 1.1rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            font-family: var(--font-mono);
            font-size: 0.74rem;
            padding: 5px 10px;
            border-radius: var(--r-3);
            background: var(--ink-2);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--line);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .status.connected {
            background: var(--signal-soft);
            border-color: var(--signal-edge);
            color: var(--signal);
        }

        .status.disconnected {
            background: var(--alarm-soft);
            border-color: var(--alarm-edge);
            color: var(--alarm);
        }

        .status .status-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        .terminal-container {
            flex: 1;
            padding: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .session-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .shell-preset {
            appearance: none;
            border: 1px solid var(--line);
            background: var(--ink-1);
            color: var(--text-light);
            border-radius: var(--r-3);
            padding: 6px 10px;
            font-family: var(--font-mono);
            font-size: 0.74rem;
            cursor: pointer;
            transition: border-color var(--transition-fast), color var(--transition-fast);
        }

        .shell-preset::before {
            content: "$ ";
            color: var(--text-dim);
        }

        .shell-preset:hover {
            border-color: var(--signal-edge);
            color: var(--signal);
        }

        #terminal {
            flex: 1;
            background: var(--ink-0);
            border: 1px solid var(--line);
            border-radius: var(--r-4);
            padding: 14px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.55;
            position: relative;
        }

        .output-line {
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 4px;
            animation: fadeIn 0.18s ease;
        }

        .output-chunk {
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-line.error { color: var(--alarm); }
        .output-line.success { color: var(--text-light); }
        .output-line.info { color: var(--info); }
        .output-line.warning { color: var(--warn); }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 12px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--r-3);
            background: var(--ink-1);
            gap: 10px;
        }

        .prompt {
            color: var(--signal);
            white-space: nowrap;
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 13px;
        }

        #commandInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            min-width: 0;
            padding: 0;
        }

        .input-line.secret-mode {
            border-color: var(--warn-edge);
            background: var(--warn-soft);
        }

        .input-line.secret-mode .prompt {
            color: var(--warn);
        }

        .history-indicator {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink-2);
            border: 1px solid var(--line);
            padding: 6px 12px;
            border-radius: var(--r-3);
            font-family: var(--font-mono);
            font-size: 0.74rem;
            color: var(--text-muted);
            display: none;
            z-index: 1000;
        }

        .history-indicator.show { display: block; }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; }
            .header h1 { justify-content: center; }
            .header-actions { justify-content: center; width: 100%; }
            .header-actions .status { width: 100%; justify-content: center; }
            .input-line { flex-direction: column; align-items: stretch; }
            .prompt { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NOXVEIL // SERVER SHELL</h1>
        <div class="header-actions">
            <span class="status disconnected" id="connectionStatus">
                <span class="status-indicator"></span>
                <span>disconnected</span>
            </span>
            <a href="/dashboard" class="btn btn-small">← back</a>
        </div>
    </div>

    <div class="terminal-container">
        <div class="session-toolbar" id="sessionToolbar">
            <button class="btn btn-small" id="copySessionBtn">copy log</button>
            <button class="btn btn-small" id="saveSessionBtn">save log</button>
            <button class="btn btn-small" id="clearSessionBtn">clear</button>
            <button class="btn btn-small btn-warning" id="reconnectShellBtn">reconnect</button>
            <button class="shell-preset" data-shell-command="pwd">pwd</button>
            <button class="shell-preset" data-shell-command="whoami">whoami</button>
            <button class="shell-preset" data-shell-command="hostname">hostname</button>
            <button class="shell-preset" data-shell-command="sudo -l">sudo -l</button>
        </div>
        <div id="terminal">
            <div class="output-line info">// connecting to noxveil server shell...</div>
        </div>
        <div class="input-line">
            <span class="prompt" id="prompt">server@noxveil:~$</span>
            <input type="text" id="commandInput" placeholder="enter a command..." autocomplete="off" autofocus>
        </div>
    </div>

    <div class="history-indicator" id="historyIndicator">
        history: <span id="historyPosition">0</span>/<span id="historyTotal">0</span>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (!Auth.isAuthenticated()) {
            window.location.href = "/login";
        }

        let ws = null;
        let commandHistory = [];
        let historyIndex = -1;
        let isConnected = false;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;
        let awaitingSecretInput = false;
        let sessionTranscript = [];

        const terminal = document.getElementById("terminal");
        const commandInput = document.getElementById("commandInput");
        const connectionStatus = document.getElementById("connectionStatus");
        const prompt = document.getElementById("prompt");
        const historyIndicator = document.getElementById("historyIndicator");
        const historyPosition = document.getElementById("historyPosition");
        const historyTotal = document.getElementById("historyTotal");
        const inputLine = document.querySelector(".input-line");

        function addOutput(text, type = "success") {
            const line = document.createElement("div");
            line.className = `output-line ${type}`;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            sessionTranscript.push(`${text}\n`);
        }

        function appendStream(text, type = "success") {
            if (!text) return;
            const span = document.createElement("span");
            span.className = `output-chunk ${type}`;
            span.textContent = text;
            terminal.appendChild(span);
            terminal.scrollTop = terminal.scrollHeight;
            sessionTranscript.push(text);
        }

        function updateSecretInputMode(enabled) {
            awaitingSecretInput = enabled;
            commandInput.type = enabled ? "password" : "text";
            commandInput.placeholder = enabled ? "sudo password..." : "enter a command...";
            inputLine.classList.toggle("secret-mode", enabled);
        }

        function detectSecretPrompt(text) {
            const secretPrompt = /(password|passphrase)[^:\n\r]{0,80}:\s*$/i.test(text);
            const shellPrompt = /(^|\n)[^\n\r]*[#$>]\s$/m.test(text);

            if (secretPrompt) {
                updateSecretInputMode(true);
                return;
            }

            if (shellPrompt || /sorry, try again/i.test(text)) {
                updateSecretInputMode(false);
            }
        }

        function addToHistory(command) {
            if (command.trim() && command !== commandHistory[commandHistory.length - 1]) {
                commandHistory.push(command);
                if (commandHistory.length > 200) {
                    commandHistory = commandHistory.slice(-200);
                }
                historyIndex = commandHistory.length;
                updateHistoryIndicator();
            }
        }

        function updateHistoryIndicator() {
            historyPosition.textContent = String(Math.min(historyIndex + 1, commandHistory.length));
            historyTotal.textContent = String(commandHistory.length);
            if (commandHistory.length > 0) {
                historyIndicator.classList.add("show");
            } else {
                historyIndicator.classList.remove("show");
            }
        }

        function connect() {
            const token = Auth.getToken();
            if (!token) {
                Auth.logout();
                return;
            }

            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/api/v1/ws/bash?token=${encodeURIComponent(token)}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                isConnected = true;
                reconnectAttempts = 0;
                connectionStatus.className = "status connected";
                connectionStatus.innerHTML = `<span class="status-indicator"></span><span>connected</span>`;
                addOutput("connected to noxveil server shell", "info");
                commandInput.focus();
            };

            ws.onmessage = function(event) {
                const message = JSON.parse(event.data);
                switch (message.type) {
                    case "connected":
                        addOutput(message.data, "info");
                        if (message.hostname) {
                            prompt.textContent = `server@${message.hostname}:~$`;
                        }
                        break;
                    case "output":
                        appendStream(message.data, message.is_error ? "error" : "success");
                        detectSecretPrompt(message.data);
                        break;
                    case "ping":
                        ws.send(JSON.stringify({ type: "pong" }));
                        break;
                    case "error":
                        addOutput(message.data, "error");
                        updateSecretInputMode(false);
                        break;
                    case "shell_exit":
                        addOutput(message.data, "warning");
                        updateSecretInputMode(false);
                        break;
                }
            };

            ws.onclose = function() {
                isConnected = false;
                connectionStatus.className = "status disconnected";
                connectionStatus.innerHTML = `<span class="status-indicator"></span><span>disconnected</span>`;
                updateSecretInputMode(false);

                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts += 1;
                    addOutput(`connection lost. reconnecting (${reconnectAttempts}/${maxReconnectAttempts})...`, "warning");
                    setTimeout(connect, Math.min(1000 * reconnectAttempts, 5000));
                } else {
                    addOutput("reconnect limit reached. refresh the page to try again", "error");
                }
            };

            ws.onerror = function(error) {
                console.error("WebSocket error:", error);
            };
        }

        function copySessionTranscript() {
            const payload = sessionTranscript.join("");
            if (!payload.trim()) {
                addOutput("transcript is empty", "error");
                return;
            }
            navigator.clipboard.writeText(payload)
                .then(() => addOutput("transcript copied to clipboard", "info"))
                .catch(() => addOutput("could not copy transcript", "error"));
        }

        function saveSessionTranscript() {
            const payload = sessionTranscript.join("");
            if (!payload.trim()) {
                addOutput("transcript is empty", "error");
                return;
            }
            const blob = new Blob([payload], { type: "text/plain;charset=utf-8" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `server-shell-${Date.now()}.txt`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => window.URL.revokeObjectURL(url), 1000);
            addOutput("transcript saved", "info");
        }

        function clearSessionView() {
            terminal.innerHTML = "";
            sessionTranscript = [];
            addOutput("terminal view cleared", "info");
        }

        function executeCommand(command) {
            if (!isConnected) return;

            const value = String(command ?? "");
            const trimmed = value.trim();
            if (!awaitingSecretInput && !trimmed) return;

            if (!awaitingSecretInput && trimmed) {
                addToHistory(trimmed);
                sessionTranscript.push(`$ ${trimmed}\n`);
            } else if (awaitingSecretInput) {
                sessionTranscript.push(`$ ********\n`);
            }

            ws.send(JSON.stringify({ type: "input", data: value }));
            if (awaitingSecretInput) {
                updateSecretInputMode(false);
            }
        }

        commandInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                const command = commandInput.value;
                executeCommand(command);
                commandInput.value = "";
            } else if (event.key === "ArrowUp") {
                event.preventDefault();
                if (awaitingSecretInput) return;
                if (historyIndex > 0) {
                    historyIndex -= 1;
                    commandInput.value = commandHistory[historyIndex];
                    updateHistoryIndicator();
                }
            } else if (event.key === "ArrowDown") {
                event.preventDefault();
                if (awaitingSecretInput) return;
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex += 1;
                    commandInput.value = commandHistory[historyIndex];
                    updateHistoryIndicator();
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = "";
                    updateHistoryIndicator();
                }
            } else if (event.ctrlKey && event.key === "l") {
                event.preventDefault();
                clearSessionView();
            } else if (event.ctrlKey && event.key === "c") {
                event.preventDefault();
                if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: "signal", data: "interrupt" }));
                }
                addOutput("^C", "info");
                updateSecretInputMode(false);
            }
        });

        document.getElementById("copySessionBtn").addEventListener("click", copySessionTranscript);
        document.getElementById("saveSessionBtn").addEventListener("click", saveSessionTranscript);
        document.getElementById("clearSessionBtn").addEventListener("click", clearSessionView);
        document.getElementById("reconnectShellBtn").addEventListener("click", () => {
            reconnectAttempts = 0;
            if (ws) {
                try { ws.close(); } catch (_error) { connect(); }
            } else {
                connect();
            }
        });
        document.getElementById("sessionToolbar").addEventListener("click", (event) => {
            const preset = event.target.closest("[data-shell-command]");
            if (!preset) return;
            commandInput.value = preset.getAttribute("data-shell-command") || "";
            commandInput.focus();
        });

        terminal.addEventListener("click", function() {
            commandInput.focus();
        });

        window.addEventListener("beforeunload", () => {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }
        });

        connect();
        setTimeout(() => {
            addOutput("// tips:", "info");
            addOutput("  ↑/↓  command history", "success");
            addOutput("  ctrl+l  clear terminal", "success");
            addOutput("  ctrl+c  interrupt running command", "success");
            addOutput("  sudo prompts switch input to hidden mode", "warning");
        }, 500);
    </script>
</body>
</html>
